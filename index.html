<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Microtubule Resonance Field — Paul Preprint Alignment</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; touch-action:none; }
    #info { 
      position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.75); 
      padding:10px 14px; border-radius:8px; z-index:10; min-width:240px; max-width:90vw; 
      white-space:normal; font-size:13px; line-height:1.3;
    }
    #info .title { font-weight:bold; font-size:1.0em; display:block; margin-bottom:4px; }
    
    #controls { 
      position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.88); padding:10px; border-radius:12px; color:white; 
      width:240px; max-height:80vh; overflow-y:auto; z-index:20; box-shadow:0 4px 20px rgba(0,0,0,0.6);
    }
    
    label { display:block; margin:8px 0 4px; font-size:12px; line-height:1.2; }
    input[type="range"] { width:100%; }
    
    button { margin-top:8px; width:100%; padding:8px; background:#00ffaa; border:none; border-radius:8px; color:black; font-weight:bold; font-size:13px; }
    
    @media (max-width: 768px) {
      #controls { 
        width:210px; padding:8px; top:10px; right:8px; max-height:75vh;
      }
      label { font-size:11.5px; margin:7px 0 3px; }
      #info { min-width:200px; font-size:12.5px; padding:8px 12px; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<div id="info">
  <span class="title">Microtubule Resonance Field — Paul Preprint Alignment</span>
  Drag to rotate • Pinch/scroll to zoom
</div>

<div id="controls"></div>

<script>
let scene, camera, renderer, mesh, wireMesh, controls;
let params = {
  heightScale: 3.5,
  vacuumCoupling: 1.1,
  breitWheeler: 1.8,
  schumann783: 0.4,
  schumann2349: 0.3,
  multiLobeMod: 1.4,
  hexResonator: 2.8,
  primeLattice144: 1.2,
  tryptophanSuperradiance: 1.0,
  scaleInvariant: 1.8,
  warpField: 1.2,
  metaCoupling: 0.8,
  grapheneFluid: 0.7,
  quantumRotation: 0.9,
  hffLock: 0.021,
  clutchBand: 1.32,
  ezWaterDamping: 0.8,
  anesthesiaEffect: 0.0,
  breathing: true,
  hue: 238,
  glow: 0.1,
  wireframe: true
};

async function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  const geometry = new THREE.CylinderGeometry(0.6, 0.6, 22, 24, 64, true);
  const material = new THREE.MeshPhongMaterial({ 
    color: 0x00ffcc, 
    shininess: 90,
    side: THREE.DoubleSide,
    emissive: 0x00ffcc,
    emissiveIntensity: 0.9
  });
  mesh = new THREE.Mesh(geometry, material);
  mesh.rotation.z = Math.PI / 2;
  scene.add(mesh);

  const wireMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 });
  wireMesh = new THREE.Mesh(geometry, wireMaterial);
  wireMesh.rotation.z = Math.PI / 2;
  scene.add(wireMesh);

  scene.add(new THREE.AmbientLight(0x404060));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
  dirLight.position.set(10, 20, 15);
  scene.add(dirLight);

  camera.position.set(12, 18, 28);
  camera.lookAt(0, 4, 0);

  buildControls();
  animate();
}

function computeField(x, y, z, t) {
  const r = Math.sqrt(x*x + y*y);
  const theta = Math.atan2(y, x);
  let u = 0;

  const drive = 4.0 * Math.sin(2*Math.PI*377*t) * (1 + 1.2*Math.sin(2*Math.PI*18*t));

  u += drive * (1 + 2.2 * params.vacuumCoupling);
  u += params.breitWheeler * 6.5 * Math.pow(Math.sin(2*Math.PI*377*t), 2) * Math.exp(-r*r/0.08);
  u += params.schumann783 * 5.5 * Math.sin(2*Math.PI*7.83*t);
  u += params.schumann2349 * 4.5 * Math.sin(2*Math.PI*23.49*t);
  u += params.multiLobeMod * 8.0 * Math.sin(12*theta) * Math.exp(-r*r/0.15);
  
  u += params.hexResonator * 20.0 * Math.sin(6*theta) * Math.exp(-r*r * 2.2);

  u += params.primeLattice144 * 9.5 * Math.sin(2*Math.PI*144*t) * Math.cos(6*theta);

  const superradiance = params.tryptophanSuperradiance * 7.5 * Math.sin(2*Math.PI*377*t) * Math.exp(-r*r*0.6);
  u += superradiance;

  const scaleMod = params.scaleInvariant * (Math.sin(2*Math.PI*377*t) + 0.6*Math.sin(2*Math.PI*144*t) + 0.4*Math.sin(2*Math.PI*7.83*t));
  u *= (1 + scaleMod * Math.exp(-r*r*0.4));

  u += params.warpField * 7.0 * Math.tanh(8*(x*Math.cos(2*Math.PI*t) + y*Math.sin(2*Math.PI*t)));
  u += params.metaCoupling * 5.5 * Math.sin(12*theta) * Math.cos(2*Math.PI*377*t);
  u += params.grapheneFluid * 5.0 * Math.sin(2*Math.PI*4*t);
  u += params.quantumRotation * 6.0 * Math.sin(12*theta) * Math.cos(2*Math.PI*8*t);

  u += params.hffLock * 10.0 * Math.sin(12*theta);
  u += params.clutchBand * 4.5 * Math.sin(2*Math.PI*4*t);

  if (params.breathing) u *= (1 + 2.0*Math.sin(2*Math.PI*377*t * 1.3));

  u *= Math.exp(-r*r * params.ezWaterDamping);

  const decoherence = params.anesthesiaEffect * 0.9;
  u *= (1 - decoherence);

  return u;
}

function updateSurface() {
  const t = Date.now() * 0.001;
  const vertices = mesh.geometry.attributes.position.array;

  for (let i = 0; i < vertices.length; i += 3) {
    const x = vertices[i];
    const y = vertices[i+1];
    const z = vertices[i+2];
    const displacement = computeField(x, y, z, t) * params.heightScale;
    vertices[i+2] = z + displacement * 0.85 + 2.2 * Math.sin(2*Math.PI*0.4*z + 6*Math.PI*t);
  }
  mesh.geometry.attributes.position.needsUpdate = true;
  mesh.geometry.computeVertexNormals();
  wireMesh.geometry.attributes.position.copy(mesh.geometry.attributes.position);
  wireMesh.geometry.attributes.position.needsUpdate = true;

  const colorShift = params.anesthesiaEffect * 0.6;
  const color = new THREE.Color().setHSL((params.hue + colorShift*40) / 360, 1 - colorShift*0.5, 0.7);
  mesh.material.color = color;
  mesh.material.emissive = color;
  mesh.material.emissiveIntensity = params.glow * (1 - params.anesthesiaEffect*0.4);
}

function buildControls() {
  const container = document.getElementById('controls');

  const sliders = [
    {key:'heightScale', label:'Height Scale', min:0.5, max:12, step:0.1, value:3.5},
    {key:'hexResonator', label:'Hexagonal Resonator', min:0, max:8, step:0.1, value:2.8},
    {key:'primeLattice144', label:'144 Hz Prime Lattice', min:0, max:4, step:0.1, value:1.2},
    {key:'tryptophanSuperradiance', label:'Tryptophan Superradiance', min:0, max:3, step:0.1, value:1.0},
    {key:'scaleInvariant', label:'Scale-Invariant Resonance', min:0, max:4, step:0.1, value:1.8},
    {key:'vacuumCoupling', label:'Vacuum Coupling Strength', min:0, max:4, step:0.1, value:1.1},
    {key:'breitWheeler', label:'Photon-Pair Production', min:0, max:5, step:0.1, value:1.8},
    {key:'schumann783', label:'Schumann 7.83 Hz', min:0, max:3, step:0.1, value:0.4},
    {key:'schumann2349', label:'Schumann 23.49 Hz', min:0, max:3, step:0.1, value:0.3},
    {key:'multiLobeMod', label:'Multi-Lobe Modulation', min:0, max:4, step:0.1, value:1.4},
    {key:'warpField', label:'Warp Field Gradient', min:0, max:4, step:0.1, value:1.2},
    {key:'hffLock', label:'HFF Aromatic Lock', min:0, max:2, step:0.01, value:0.021},
    {key:'clutchBand', label:'Clutch Band (GTP→GDP)', min:1.0, max:2.0, step:0.01, value:1.32},
    {key:'ezWaterDamping', label:'EZ Water Damping', min:0, max:2, step:0.1, value:0.8},
    {key:'anesthesiaEffect', label:'Anesthesia Pocket Effect', min:0, max:1, step:0.05, value:0.0},
    {key:'hue', label:'Colour Hue', min:0, max:360, step:1, value:238},
    {key:'glow', label:'Glow Intensity', min:0, max:3, step:0.1, value:0.1}
  ];

  sliders.forEach(s => {
    const div = document.createElement('div');
    div.innerHTML = `<label>${s.label}: <span id="${s.key}Val">${s.value}</span></label>
                     <input type="range" id="${s.key}Slider" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.value}">`;
    container.appendChild(div);

    document.getElementById(s.key + 'Slider').addEventListener('input', (e) => {
      params[s.key] = parseFloat(e.target.value);
      document.getElementById(s.key + 'Val').textContent = params[s.key].toFixed(2);
    });
  });

  const breathDiv = document.createElement('div');
  breathDiv.innerHTML = `<label><input type="checkbox" id="breathingToggle" checked> Coherent Modulation Mode</label>`;
  container.appendChild(breathDiv);
  document.getElementById('breathingToggle').addEventListener('change', (e) => { params.breathing = e.target.checked; });

  const wireDiv = document.createElement('div');
  wireDiv.innerHTML = `<label><input type="checkbox" id="wireToggle" checked> Wireframe Overlay</label>`;
  container.appendChild(wireDiv);
  document.getElementById('wireToggle').addEventListener('change', (e) => { wireMesh.visible = e.target.checked; });

  const resetBtn = document.createElement('button');
  resetBtn.textContent = 'Reset All';
  resetBtn.onclick = () => location.reload();
  container.appendChild(resetBtn);
}

function animate() {
  requestAnimationFrame(animate);
  if (mesh) updateSurface();
  if (controls) controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
